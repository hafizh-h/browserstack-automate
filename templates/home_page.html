<html lang="en">
<head>
  <title>Automated Testing Device Log</title>
  <meta charset="utf-8">
  <meta name="viewport" content="wnameth=device-wnameth, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <script src="{{url_for('static', filename='js/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
  <script type="text/javascript">// <![CDATA[
        function loading(){
            $("#loading").show();
            $("#content").hide();
        }
// ]]></script>
  <style>
    div#loading {
      display: none;
      cursor: wait;
    }
  </style>
</head>
<body>
<div id="loading">
  <center><br><br><br><br><h3>Please wait...</h3><img src="/static/loading.gif"></center>
</div>
<div class="container" id="content">
  <h2 style="text-align:center"><br>Automated Testing<br><br></h2>
  <form action="/testing" method="POST" style="width:80%; padding-left:200px;">
    <div class="form-group">
      <label for="build">Build:</label>
      <input type="text" class="form-control" name="build" placeholder="Enter build">
    </div>
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" class="form-control" name="name" placeholder="Enter name">
    </div>
    <div class="form-group">
      <label for="platformName">Platform Name:</label>
      <input type="text" class="form-control" name="platformName" placeholder="Enter platform name">
    </div>
      <div class="form-group">
      <label for="platformVersion">Platform Version:</label>
      <input type="text" class="form-control" name="platformVersion" placeholder="Enter platform version">
    </div>
    <div class="form-group">
      <label for="deviceName">Device Name:</label>
      <input type="text" class="form-control" name="deviceName" placeholder="Enter device name">
    </div>
    <div class="form-group">
      <label for="app">App:</label>
      <input type="text" class="form-control" name="app" placeholder="Enter app">
    </div>
    <div class="form-group">
      <label for="iteration">Iteration:</label>
      <input type="text" class="form-control" name="iteration" placeholder="Enter iteration">
    </div>
    <div class="form-group">
      <label for="type">Type:   &nbsp;&nbsp;&nbsp;</label>
      <input type="radio"  name="type" value="warm">  Warm Launch   &nbsp;&nbsp;&nbsp;
      <input type="radio"  name="type" value="cold">  Cold Launch
    </div>
    <button type="submit" class="btn btn-primary" onClick="loading();">Submit</button>
    <button type="reset" class="btn btn-default">Clear</button>
  </form>
</div>
</body>
</html>
